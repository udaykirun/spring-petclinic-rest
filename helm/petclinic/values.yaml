replicaCount: 1

image:
  repository: ghcr.io/udaykirun/petclinic
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80
  targetPort: 9966

ingress:
  enabled: false

postgresql:
  host: "petclinic-postgres-postgresql.production.svc.cluster.local"
  port: 5432
  database: petclinic
  user: petclinic
  password: ""

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: false
